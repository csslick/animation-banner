<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Banner</title>
  <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">
  <style>
    body {
      font-weight: '맑은 고딕', '나눔고딕', sans-serif;
    }
    /* 배너 규격 700 x 400 */
    .banner {
      background: #ccc;
      width: 700px; height: 400px;
      position: relative;
    }
    .banner > video {
      position: absolute;
    }
    .banner > header {
      position: relative;
      color: #fff;
    }
    .banner > .btn_call {
      position: absolute;
      left: 88px; top: 318px;
      display: block;
      width: 170px; height: 40px;
      background: #fff;
      color: #000;
      text-align: center;
      line-height: 40px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
    }

    header { font-family: 'Courgette', cursive;}
    header > h1 > span:first-child {
      font-size: 60px;
      display: block;
      position: absolute;
      left: 110px; top: 77px;
      text-shadow: 2px 2px 4px #000;
      opacity: 0;
    }

    /* play class: 애니메이션 재생 상태 */
    header > h1 > span:first-child.play {
      animation-name: title;
      animation-duration: 10s;
      animation-iteration-count: infinite;
    }

    header > h1 > span:last-child {
      font-size: 100px;
      display: block;
      position: absolute;
      left: 56px; top: 157px;
      text-shadow: 2px 2px 4px #000;
      opacity: 0;
    }

    header > h1 > span:last-child.play {
      animation-name: title;
      animation-duration: 10s;
      animation-iteration-count: infinite;
      animation-delay: 0.4s;
    }

    @keyframes title {
      0% { opacity: 0;}
      15% { opacity: 0;}
      30% { opacity: 1;}
      90% { opacity: 1;}
      100% { opacity: 0;}
    }


  </style>
</head>
<body>
  <div href="#" class="banner">
    <video 
      src="./coffee.mp4"
      autoplay
      loop
      muted
    ></video>
    <header>
      <h1>
        <span>Fresh</span>
        <span>Coffee</span>
      </h1>
    </header>
    <a href="#" class="btn_call">주문하기</a>
  </div>

  <script>
    // 문서와 관련 파일들이 로딩 완료 됨을 채크하는 이벤트
    window.onload = function(){
      // alert('문서 및 파일 로드 완료!');
      var title1 = document.querySelector('header > h1 > span:first-child');
      var title2 = document.querySelector('header > h1 > span:last-child');
      title1.setAttribute('class', 'play');
      title2.setAttribute('class', 'play');
    }
  </script>
</body>
</html>
